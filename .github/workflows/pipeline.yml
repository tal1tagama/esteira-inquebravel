name: Esteira Inquebrável

on:
  push:
    branches: ["main"]

jobs:

  validar-html:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Instalar HTMLHint
        run: npm install -g htmlhint

      - name: Validar HTML
        run: htmlhint "**/*.html"


  validar-css:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Verificar CSS
        run: |
          echo "Verificando CSS..."
          if grep -r "ERRO-CSS" ./*.css; then
            echo "Erro no CSS encontrado!"
            exit 1
          else
            echo "CSS OK!"
          fi


  preparar-entrega:
    runs-on: ubuntu-latest
    needs: [validar-html, validar-css]

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Criar pasta dist
        run: |
          mkdir dist
          cp *.html dist/ || true
          cp *.css dist/ || true
          echo "Entrega preparada!"